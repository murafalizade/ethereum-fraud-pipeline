version: '3'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0  # Using a stable version is safer
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0  # Matching version
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Crucial: Map listeners for both internal (Docker) and external (Your Python script)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ENABLE_KRAFT: 'false'
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password123
      # This is the specific fix for Neo4j 5.x
      - NEO4J_server_default__listen__address=0.0.0.0
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  neo4j_data:
  neo4j_logs: